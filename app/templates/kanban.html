{% extends "base.html" %}
{% block title %}Канбан — CRM RAI{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-medium text-ink">Канбан</h1>
</div>

<form id="kanban-filters" class="flex gap-3 mb-4 flex-wrap" hx-get="/kanban" hx-target="#kanban-board" hx-trigger="change" hx-swap="innerHTML">
    <select name="region" class="border border-black/10 rounded-lg px-3 py-1.5 text-sm text-ink bg-white">
        <option value="">Все регионы</option>
        {% for r in regions %}
        <option value="{{ r.id }}" {% if region_id == r.id %}selected{% endif %}>{{ r.name }}</option>
        {% endfor %}
    </select>
    <select name="level" class="border border-black/10 rounded-lg px-3 py-1.5 text-sm text-ink bg-white">
        <option value="">Все уровни</option>
        {% for l in ["A", "B", "C"] %}
        <option value="{{ l }}" {% if level == l %}selected{% endif %}>{{ l }}</option>
        {% endfor %}
    </select>
    <select name="priority" class="border border-black/10 rounded-lg px-3 py-1.5 text-sm text-ink bg-white">
        <option value="">Все приоритеты</option>
        {% for p in [1, 2, 3] %}
        <option value="{{ p }}" {% if priority == p %}selected{% endif %}>{{ p }}</option>
        {% endfor %}
    </select>
    {% if current_user.role.value in ('supervisor', 'admin') %}
    <select name="assigned_manager" class="border border-black/10 rounded-lg px-3 py-1.5 text-sm text-ink bg-white">
        <option value="">Все менеджеры</option>
        {% for u in users %}
        <option value="{{ u.id }}" {% if assigned_manager_id == u.id %}selected{% endif %}>{{ u.full_name }}</option>
        {% endfor %}
    </select>
    <select name="manager" class="border border-black/10 rounded-lg px-3 py-1.5 text-sm text-ink bg-white">
        <option value="all" {% if manager == 'all' %}selected{% endif %}>Все лиды</option>
        <option value="my" {% if manager == 'my' %}selected{% endif %}>Мои лиды</option>
    </select>
    {% endif %}
</form>

<div id="kanban-board" class="flex gap-3 overflow-x-auto pb-4">
    {% include "partials/kanban_board.html" %}
</div>

<script src="/static/js/kanban.js"></script>
{% endblock %}

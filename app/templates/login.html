{% extends "base.html" %}
{% block fullpage %}
<div class="min-h-screen flex items-center justify-center bg-canvas">
    <div class="bg-white border border-black/10 rounded-2xl p-8 w-full max-w-md">
        <h1 class="text-2xl font-medium text-center mb-6 text-ink">CRM RAI — Вход</h1>
        {% if error %}
        <div class="bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
            <div class="mb-4">
                <label class="block text-sm font-medium text-muted mb-1">Email</label>
                <input type="email" name="email" required
                    class="w-full px-3 py-2 border border-black/10 rounded-lg text-sm text-ink focus:outline-none focus:ring-2 focus:ring-ink/20">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-muted mb-1">Пароль</label>
                <input type="password" name="password" required
                    class="w-full px-3 py-2 border border-black/10 rounded-lg text-sm text-ink focus:outline-none focus:ring-2 focus:ring-ink/20">
            </div>
            <button type="submit"
                class="w-full bg-ink text-white py-2 rounded-lg text-sm hover:bg-ink/90 transition">Войти</button>
        </form>
    </div>
</div>
{% endblock %}

<div class="p-3 bg-slate-50 rounded-lg border border-black/10">
    <div class="flex justify-between items-start">
        <div class="text-sm font-medium text-ink">{{ comment.user.full_name if comment.user else '—' }}</div>
        <div class="text-xs text-muted">{{ comment.created_at.strftime('%d.%m.%Y %H:%M') }}</div>
    </div>
    <div class="text-sm mt-1 whitespace-pre-wrap text-ink">{{ comment.body }}</div>
</div>

<div class="bg-white border border-black/10 rounded-2xl p-6">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-medium text-ink">Комментарии</h2>
        <button onclick="openDrawer('/leads/{{ lead.id }}/comments/form', 'Новый комментарий')"
                class="bg-white border border-black/10 px-3 py-1.5 rounded-lg text-sm text-ink hover:bg-slate-50">
            + Добавить
        </button>
    </div>
    <div id="comments-list" class="space-y-3">
        {% for comment in lead.comments|sort(attribute='created_at', reverse=true) %}
        {% include "partials/comment_row.html" %}
        {% else %}
        <div class="flex flex-col items-center justify-center py-12 text-center">
            <svg class="w-12 h-12 text-muted/30 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/>
            </svg>
            <div class="text-sm text-muted mb-3">Нет комментариев</div>
            <button onclick="openDrawer('/leads/{{ lead.id }}/comments/form', 'Новый комментарий')"
                    class="bg-white border border-black/10 px-3 py-1.5 rounded-lg text-sm text-ink hover:bg-slate-50">
                + Добавить
            </button>
        </div>
        {% endfor %}
    </div>
</div>

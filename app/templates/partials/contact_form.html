<form hx-post="/leads/{{ lead_id }}/contacts" hx-target="#contacts-list" hx-swap="beforeend"
      hx-on::after-request="closeDrawer()">
    <div class="space-y-4">
        <div>
            <label class="block text-xs text-muted mb-1">Имя</label>
            <input type="text" name="name" class="w-full border border-black/10 rounded-lg px-3 py-2 text-sm text-ink">
        </div>
        <div>
            <label class="block text-xs text-muted mb-1">Должность</label>
            <input type="text" name="position" class="w-full border border-black/10 rounded-lg px-3 py-2 text-sm text-ink">
        </div>
        <div>
            <label class="block text-xs text-muted mb-1">Телефон</label>
            <input type="text" name="phone" required class="w-full border border-black/10 rounded-lg px-3 py-2 text-sm font-mono text-ink">
        </div>
        <div>
            <label class="block text-xs text-muted mb-1">Email</label>
            <input type="email" name="email" class="w-full border border-black/10 rounded-lg px-3 py-2 text-sm text-ink">
        </div>
        <div class="flex items-center gap-2">
            <input type="checkbox" name="is_decision_maker" id="drawer_dm" class="rounded">
            <label for="drawer_dm" class="text-sm text-ink">ЛПР</label>
        </div>
        <button type="submit" class="w-full bg-ink text-white px-4 py-2 rounded-lg text-sm hover:bg-ink/90">Добавить</button>
    </div>
</form>

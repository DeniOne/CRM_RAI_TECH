<div class="p-3 bg-slate-50 rounded-lg border border-black/10">
    <div class="flex justify-between items-start">
        <div>
            <span class="text-xs font-medium text-muted">{{ log.contact_type }}</span>
            <span class="text-xs text-muted ml-2">{{ log.contact_date.strftime('%d.%m.%Y %H:%M') }}</span>
            {% if log.outcome %}
            <span class="text-xs ml-2 px-1.5 rounded-lg
                {% if log.outcome == 'agreed' %}bg-emerald-50 text-emerald-600
                {% elif log.outcome == 'refused' %}bg-red-50 text-red-600
                {% elif log.outcome == 'sent_kp' %}bg-purple-50 text-purple-600
                {% else %}bg-slate-100 text-muted{% endif %}">{{ log.outcome }}</span>
            {% endif %}
        </div>
    </div>
    <div class="text-sm mt-1 text-ink">{{ log.result }}</div>
    {% if log.next_action_date %}
    <div class="text-xs text-blue-500 mt-1">Следующее действие: {{ log.next_action_date.strftime('%d.%m.%Y') }}</div>
    {% endif %}
</div>

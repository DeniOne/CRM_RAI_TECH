<div class="flex items-center justify-between p-3 bg-slate-50 rounded-lg border border-black/10" id="contact-{{ contact.id }}">
    <div class="flex-1">
        <div class="font-medium text-sm text-ink">{{ contact.name or '—' }}</div>
        <div class="text-xs text-muted">
            <span class="font-mono">{{ contact.phone }}</span>
            {% if contact.position %} · {{ contact.position }}{% endif %}
            {% if contact.email %} · {{ contact.email }}{% endif %}
        </div>
    </div>
    <div class="flex items-center gap-2">
        <label class="flex items-center gap-1 text-xs">
            <input type="checkbox" {% if contact.is_decision_maker %}checked{% endif %}
                hx-post="/leads/{{ lead_id }}/contacts/{{ contact.id }}/toggle-dm"
                hx-target="#contact-{{ contact.id }}" hx-swap="outerHTML"
                class="rounded">
            <span class="text-muted">ЛПР</span>
        </label>
        <button onclick="openDrawer('/leads/{{ lead_id }}/contacts/{{ contact.id }}/edit', 'Редактировать контакт')"
                class="text-muted hover:text-ink p-1" title="Редактировать">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
        </button>
        <button hx-delete="/leads/{{ lead_id }}/contacts/{{ contact.id }}" hx-target="#contact-{{ contact.id }}" hx-swap="outerHTML"
                hx-confirm="Удалить контакт?"
                class="text-muted hover:text-red-600 p-1" title="Удалить">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
        </button>
    </div>
</div>

<div class="flex items-center justify-between p-3 bg-slate-50 rounded-lg border border-black/10" id="contact-{{ contact.id }}">
    <div class="flex-1">
        <div class="font-medium text-sm text-ink">{{ contact.name or '—' }}</div>
        <div class="text-xs text-muted">
            <span class="font-mono">{{ contact.phone }}</span>
            {% if contact.position %} · {{ contact.position }}{% endif %}
            {% if contact.email %} · {{ contact.email }}{% endif %}
        </div>
    </div>
    <div class="flex items-center gap-3">
        <label class="flex items-center gap-1 text-xs">
            <input type="checkbox" {% if contact.is_decision_maker %}checked{% endif %}
                hx-post="/leads/{{ lead_id }}/contacts/{{ contact.id }}/toggle-dm"
                hx-target="#contact-{{ contact.id }}" hx-swap="outerHTML"
                class="rounded">
            <span class="text-muted">ЛПР</span>
        </label>
    </div>
</div>

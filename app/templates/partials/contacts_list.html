<div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-lg font-semibold mb-4">Контакты</h2>
    <div id="contacts-list" class="space-y-2 mb-4">
        {% for contact in lead.contacts %}
        {% include "partials/contact_row.html" %}
        {% endfor %}
    </div>
    <form hx-post="/leads/{{ lead.id }}/contacts" hx-target="#contacts-list" hx-swap="beforeend" class="border-t pt-4">
        <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
            <input type="text" name="name" placeholder="Имя" class="border rounded px-3 py-2 text-sm">
            <input type="text" name="position" placeholder="Должность" class="border rounded px-3 py-2 text-sm">
            <input type="text" name="phone" placeholder="Телефон" required class="border rounded px-3 py-2 text-sm">
            <input type="email" name="email" placeholder="Email" class="border rounded px-3 py-2 text-sm">
            <div class="flex items-center gap-2">
                <input type="checkbox" name="is_decision_maker" id="new_dm" class="rounded">
                <label for="new_dm" class="text-sm text-gray-600">ЛПР</label>
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700 ml-auto">Добавить</button>
            </div>
        </div>
    </form>
</div>

<div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-lg font-semibold mb-4">Сделки</h2>

    <div id="deals-list" class="space-y-2 mb-4">
        {% for deal in deals %}
        {% include "partials/deal_row.html" %}
        {% else %}
        <div class="text-gray-400 text-sm">Нет сделок</div>
        {% endfor %}
    </div>

    <div class="border-t pt-4">
        <h3 class="text-sm font-medium mb-2">Новая сделка</h3>
        <form hx-post="/leads/{{ lead_id }}/deals" hx-target="#tab-deals" hx-swap="innerHTML" class="flex gap-3 items-end">
            <div>
                <label class="block text-xs text-gray-500 mb-1">Название</label>
                <input type="text" name="title" required placeholder="КП ГРИПИЛ 100л" class="border rounded px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Сумма</label>
                <input type="number" name="amount" step="0.01" class="border rounded px-3 py-2 text-sm w-32">
            </div>
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700">Создать</button>
        </form>
    </div>
</div>

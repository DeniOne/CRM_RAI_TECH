<div class="bg-white border border-black/10 rounded-2xl p-6">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-medium text-ink">Сделки</h2>
        <button onclick="openDrawer('/leads/{{ lead_id }}/deals/form', 'Новая сделка')"
                class="bg-white border border-black/10 px-3 py-1.5 rounded-lg text-sm text-ink hover:bg-slate-50">
            + Создать
        </button>
    </div>

    <div id="deals-list" class="space-y-2">
        {% for deal in deals %}
        {% include "partials/deal_row.html" %}
        {% else %}
        <div class="flex flex-col items-center justify-center py-12 text-center">
            <svg class="w-12 h-12 text-muted/30 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <div class="text-sm text-muted mb-3">Нет сделок</div>
            <button onclick="openDrawer('/leads/{{ lead_id }}/deals/form', 'Новая сделка')"
                    class="bg-white border border-black/10 px-3 py-1.5 rounded-lg text-sm text-ink hover:bg-slate-50">
                + Создать
            </button>
        </div>
        {% endfor %}
    </div>
</div>

<div class="flex items-center justify-between p-3 bg-slate-50 rounded-lg border border-black/10">
    <div class="flex-1">
        <div class="font-medium text-sm text-ink">{{ doc.title }}</div>
        <div class="text-xs text-muted">
            {{ doc.doc_type }}
            {% if doc.number %} · №<span class="font-mono">{{ doc.number }}</span>{% endif %}
            {% if doc.amount %} · <span class="font-mono">{{ doc.amount }}</span> ₽{% endif %}
            · {{ doc.created_at.strftime('%d.%m.%Y') }}
        </div>
    </div>
    <div class="flex items-center gap-2">
        <select hx-post="/documents/{{ doc.id }}/status" hx-target="closest div" hx-swap="outerHTML"
                name="status" class="text-xs border border-black/10 rounded-lg px-2 py-1 text-ink bg-white">
            <option value="draft" {% if doc.status=='draft' %}selected{% endif %}>Черновик</option>
            <option value="sent" {% if doc.status=='sent' %}selected{% endif %}>Отправлен</option>
            <option value="viewed" {% if doc.status=='viewed' %}selected{% endif %}>Просмотрен</option>
            <option value="accepted" {% if doc.status=='accepted' %}selected{% endif %}>Принят</option>
            <option value="rejected" {% if doc.status=='rejected' %}selected{% endif %}>Отклонён</option>
        </select>
        <a href="/documents/{{ doc.id }}/download?format=docx" class="text-blue-500 hover:text-blue-600 text-xs">.docx</a>
        {% if doc.file_path_pdf %}
        <a href="/documents/{{ doc.id }}/download?format=pdf" class="text-red-600 hover:text-red-700 text-xs">.pdf</a>
        {% endif %}
    </div>
</div>

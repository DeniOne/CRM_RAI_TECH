<form id="lead-create-form" class="space-y-4"
      hx-post="/leads/create" hx-swap="none"
      hx-on::after-request="if(event.detail.successful){ closeDrawer(); window.location.reload(); }"
      hx-on::response-error="var btn=document.getElementById('lead-submit-btn'); btn.disabled=false; btn.textContent='Создать лид'; event.detail.xhr.response && showToast(JSON.parse(event.detail.xhr.response).detail || 'Ошибка создания', 'error');">
    <div>
        <label class="block text-xs text-muted mb-1">Название *</label>
        <input type="text" name="name" required placeholder="ООО «Ромашка»"
               class="w-full border border-black/10 rounded-lg px-3 py-2 text-sm text-ink focus:outline-none focus:ring-2 focus:ring-ink/20">
    </div>

    <div>
        <label class="block text-xs text-muted mb-1">Регион</label>
        <select name="region_id" id="region-select"
                onchange="document.getElementById('new-region-wrap').classList.toggle('hidden', this.value !== 'new')"
                class="w-full border border-black/10 rounded-lg px-3 py-2 text-sm text-ink bg-white">
            <option value="">— не выбран —</option>
            {% for r in regions %}
            <option value="{{ r.id }}">{{ r.name }}</option>
            {% endfor %}
            <option value="new">+ Новый регион...</option>
        </select>
    </div>
    <div id="new-region-wrap" class="hidden">
        <label class="block text-xs text-muted mb-1">Название нового региона</label>
        <input type="text" name="new_region" placeholder="Например: Тульская область"
               class="w-full border border-black/10 rounded-lg px-3 py-2 text-sm text-ink focus:outline-none focus:ring-2 focus:ring-ink/20">
    </div>

    <div class="grid grid-cols-2 gap-3">
        <div>
            <label class="block text-xs text-muted mb-1">ИНН</label>
            <input type="text" name="inn" class="w-full border border-black/10 rounded-lg px-3 py-2 text-sm text-ink font-mono">
        </div>
        <div>
            <label class="block text-xs text-muted mb-1">Руководитель</label>
            <input type="text" name="head_name" class="w-full border border-black/10 rounded-lg px-3 py-2 text-sm text-ink">
        </div>
    </div>

    <div>
        <label class="block text-xs text-muted mb-1">Сайт</label>
        <input type="text" name="site" placeholder="example.ru"
               class="w-full border border-black/10 rounded-lg px-3 py-2 text-sm text-ink">
    </div>

    <div class="grid grid-cols-2 gap-3">
        <div>
            <label class="block text-xs text-muted mb-1">Уровень</label>
            <select name="level" class="w-full border border-black/10 rounded-lg px-3 py-2 text-sm text-ink bg-white">
                <option value="">—</option>
                {% for l in ["A", "B", "C"] %}
                <option value="{{ l }}">{{ l }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-xs text-muted mb-1">Приоритет</label>
            <select name="priority" class="w-full border border-black/10 rounded-lg px-3 py-2 text-sm text-ink bg-white">
                <option value="">—</option>
                {% for p in [1, 2, 3] %}
                <option value="{{ p }}">{{ p }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    {% if current_user.role.value in ('supervisor', 'admin') %}
    <div>
        <label class="block text-xs text-muted mb-1">Менеджер *</label>
        <select name="assigned_manager_id" required
                class="w-full border border-black/10 rounded-lg px-3 py-2 text-sm text-ink bg-white">
            <option value="">— выберите менеджера —</option>
            {% for u in users %}
            <option value="{{ u.id }}">{{ u.full_name }}</option>
            {% endfor %}
        </select>
    </div>
    {% else %}
    {# Менеджер создаёт лид — назначается на него автоматически (скрытое поле) #}
    <input type="hidden" name="assigned_manager_id" value="{{ current_user.id }}">
    {% endif %}

    <div>
        <label class="block text-xs text-muted mb-1">Комментарий</label>
        <textarea name="general_comment" rows="2"
                  class="w-full border border-black/10 rounded-lg px-3 py-2 text-sm text-ink"></textarea>
    </div>

    <button type="submit" id="lead-submit-btn"
            hx-disabled-elt="this"
            class="w-full bg-ink text-white px-4 py-2 rounded-lg text-sm hover:bg-ink/90">
        Создать лид
    </button>
</form>

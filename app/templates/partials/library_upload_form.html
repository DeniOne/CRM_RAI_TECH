{# Форма загрузки файлов (в drawer). Паттерн task_form + multipart. #}
{# Переменные: current_folder_id (None = корень) #}
<form hx-post="/library/upload"
      hx-encoding="multipart/form-data"
      hx-target="#library-listing"
      hx-swap="innerHTML"
      hx-on::after-request="closeDrawer()">
    <input type="hidden" name="folder_id" value="{{ current_folder_id if current_folder_id else '' }}">
    <div class="space-y-4">
        <div>
            <label class="block text-xs text-muted mb-1">Файлы</label>
            <input type="file"
                   name="files"
                   multiple
                   required
                   class="w-full border border-black/10 rounded-lg px-3 py-2 text-sm text-ink bg-white">
            <p class="text-xs text-muted mt-1.5">Можно выбрать несколько файлов. Любые типы: презентации, КП, фото, видео.</p>
        </div>
        <button type="submit" class="w-full bg-ink text-white px-4 py-2 rounded-lg text-sm hover:bg-ink/90 flex items-center justify-center gap-1.5">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
            </svg>
            Загрузить
        </button>
    </div>
</form>

{% extends "base.html" %}
{% block title %}Таски — CRM RAI{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Мои таски</h1>

<div class="flex gap-2 mb-4">
    <a href="/tasks?status=pending" class="px-3 py-1.5 text-sm rounded {% if status == 'pending' %}bg-blue-600 text-white{% else %}bg-gray-200 text-gray-700 hover:bg-gray-300{% endif %}">Активные</a>
    <a href="/tasks?status=done" class="px-3 py-1.5 text-sm rounded {% if status == 'done' %}bg-blue-600 text-white{% else %}bg-gray-200 text-gray-700 hover:bg-gray-300{% endif %}">Завершённые</a>
    <a href="/tasks?status=all" class="px-3 py-1.5 text-sm rounded {% if status == 'all' %}bg-blue-600 text-white{% else %}bg-gray-200 text-gray-700 hover:bg-gray-300{% endif %}">Все</a>
</div>

<div id="tasks-list" class="space-y-2">
    {% for task in tasks %}
    {% include "partials/task_row.html" %}
    {% else %}
    <div class="text-gray-400 text-center py-8">Нет тасков</div>
    {% endfor %}
</div>
{% endblock %}
